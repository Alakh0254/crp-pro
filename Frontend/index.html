<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Trial Platform — Apply</title>
    <!-- Fonts (Inter + Material Symbols) are self-hosted via @fontsource and bundled
         through src/main.jsx — no request to Google's font CDN, so no viewer IP leaks
         to a non-BAA third party on PHI-bearing pages. -->
  </head>
  <body>
    <!-- React mounts the whole app into this empty div (see src/main.jsx). -->
    <div id="root"></div>
    <!-- type="module" lets the browser load our app as an ES module.
         Vite serves and bundles everything starting from this entry file. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

server {
    # nginx-unprivileged serves on 8080 as the non-root uid 101 user.
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths return index.html so React Router can
    # resolve client-side routes (e.g. /login) instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints asset filenames, so they can be cached forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached, or clients keep loading a stale build that
    # points at old fingerprinted assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # /api is intentionally NOT proxied here: this image is a purely static SPA and
    # talks to the FastAPI backend directly over CORS (CORS_ORIGINS on the API),
    # not through a reverse proxy.
}
